# emotion2vec model variants that output class labels (9-class head).
# The plain "emotion2vec_base" is excluded: it only returns features, no classifier.
#
# Labels emitted by all variants below:
#   angry, disgusted, fearful, happy, neutral, other, sad, surprised, unknown
#
# Used by comparison/evaluate.py and experiments/comparison/run_emotion2vec.sh.
variants:
  # HuggingFace org IDs (default --hub=hf). For ModelScope use iic/... with --hub=ms.
  - emotion2vec/emotion2vec_base_finetuned
  - emotion2vec/emotion2vec_plus_seed
  - emotion2vec/emotion2vec_plus_base
  - emotion2vec/emotion2vec_plus_large
