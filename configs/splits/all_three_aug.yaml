name: b1_b2_kazattsd_aug_v1
seed: 42
speaker_disjoint: true
stratify_by: emotion
output_dir: splits

# KazATTSD replaces KazEmo as a training corpus (KazEmo's 3 speakers caused
# severe overfitting). KazEmo is retained as an evaluation-only corpus — all
# 3 speakers go to val+test, none to train.
corpora:
  batch01:
    mode: split
    hf_id: 01gumano1d/batch01-validation-test
    hf_split: train
    cache_dir: data/batch01-validation-test
    ratios: {train: 0.70, val: 0.15, test: 0.15}
    speaker_column: speaker_id
    augmented_policy: train_val_only

  batch02:
    mode: split
    hf_id: 01gumano1d/batch2-aug-clean
    hf_split: train
    cache_dir: data/batch2-aug-clean
    ratios: {train: 0.90, val: 0.05, test: 0.05}
    group_by: source_recording
    augmented_policy: train_only

  kazattsd:
    mode: split
    hf_id: 01gumano1d/KazATTSD-batch0
    hf_split: train
    cache_dir: data/kazattsd
    ratios: {train: 0.90, val: 0.05, test: 0.05}
    speaker_column: speaker_id
    augmented_policy: drop_all

  kazemo:
    # Eval-only: every KazEmo speaker goes to val+test, none to train.
    # 5k balanced subsample (round-robin across emotions) — full 55k makes
    # per-epoch validation dominate wallclock with no informational gain.
    mode: split
    cache_dir: data/kazemo
    max_samples: 5000
    max_per_speaker: null
    speaker_selection:
      strategy: valtest_all
    valtest_ratio: {val: 0.5, test: 0.5}

checks:
  fail_on_speaker_overlap: true
  fail_on_row_overlap: true
  max_ratio_drift_pp: 5
  min_samples_per_emotion_per_split: 5
