model:
  name: wavlm_base_plus
  pretrained: microsoft/wavlm-base-plus
  freeze_backbone: false          # full-finetune from epoch 0 (no stage-2)
  use_spec_augment: true

training:
  num_epochs: 40               # matches Exp 1-3 compute (stage1 15 + stage2 25)
  head_learning_rate: 2.0e-4
  emotion_weight: 1.0
  gender_weight: 1.0
  age_weight: 1.0
  grad_clip_norm: 1.0
  early_stopping: false        # fixed budget — no early stopping for fair comparison
  early_stopping_patience: 40
  label_smoothing: 0.1
  class_weighting: balanced
  weight_decay: 0.05
  default_batch_size: 8
  scheduler:
    type: cosine
    hold_epochs: 3
    decay_epochs: 37

finetune:
  backbone_lr_top: 1.0e-5
  layer_decay: 0.85
  unfreeze_feature_proj: false
  training_drop_path: 0.1

dataloader:
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true

checkpointing:
  num_checkpoints: 5
  keep_last_n: 5
  save_latest_every_steps: false

validation:
  num_validations: 5

compile:
  enabled: true
  mode: default
