model:
  name: hubert_base
  pretrained: facebook/hubert-base-ls960
  freeze_backbone: true
  use_spec_augment: false

training:
  num_epochs: 15
  head_learning_rate: 1.0e-3
  emotion_weight: 1.0
  gender_weight: 1.0
  age_weight: 1.0
  grad_clip_norm: 1.0
  early_stopping: false          # if true, stop after `early_stopping_patience` epochs without val improvement
  early_stopping_patience: 20
  label_smoothing: 0.1
  # balanced = sklearn 'balanced' weights (w_i = N / (K * n_i)); equalises each
  # class's total gradient mass so rare classes aren't drowned out by common
  # ones. Weights are computed from the training split only. Set to 'none' to
  # restore unweighted CE.
  class_weighting: balanced
  weight_decay: 0.01
  default_batch_size: 4
  scheduler:
    type: cosine
    hold_epochs: 3
    decay_epochs: 12

dataloader:
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true

checkpointing:
  num_checkpoints: 5
  keep_last_n: 5
  save_latest_every_steps: false

validation:
  num_validations: 5

compile:
  enabled: true
  mode: default
