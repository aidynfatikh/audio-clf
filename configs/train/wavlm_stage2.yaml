model:
  name: wavlm_base_plus
  pretrained: microsoft/wavlm-base-plus
  freeze_backbone: true          # stage2 starts frozen, then unfreezes selected layers
  use_spec_augment: true

training:
  num_epochs: 25
  head_learning_rate: 2.0e-4     # only used if finetune block absent
  emotion_weight: 1.0
  gender_weight: 1.0
  age_weight: 1.0
  grad_clip_norm: 1.0
  early_stopping: false
  early_stopping_patience: 25
  label_smoothing: 0.1
  class_weighting: balanced   # balanced | none (see hubert_stage1.yaml for details)
  weight_decay: 0.05          # stronger than stage1 — backbone is trainable now
  default_batch_size: 8
  scheduler:
    type: cosine
    hold_epochs: 3
    decay_epochs: 22
    scale_group_decay: true
    group_power_lo: 0.8
    group_power_hi: 1.3

finetune:
  backbone_lr_top: 5.0e-5
  layer_decay: 0.85
  head_lr: 2.0e-4
  unfreeze_top_n: 3
  unfreeze_contiguous: true      # pick best contiguous window — no gaps in gradient flow
  unfreeze_feature_proj: false
  training_drop_path: 0.15
  init_from: ""                  # defaults to $MODEL_DIR/best_model.pt

dataloader:
  num_workers: 4
  prefetch_factor: 2
  persistent_workers: true

checkpointing:
  num_checkpoints: 5
  keep_last_n: 5
  save_latest_every_steps: false

validation:
  num_validations: 5

compile:
  enabled: true
  mode: default
